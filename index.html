<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:black;
  color:white;
  text-align:center;
  overflow:hidden;
}

.hidden { display:none; }

#passwordBox, #quizBox { margin-top: 30vh; }

input {
  padding:10px;
  font-size:18px;
  border-radius:8px;
  border:none;
}

button {
  padding:10px 20px;
  font-size:18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#unlockBtn { background:#ff4da6; color:white; }
#errorMsg { color:red; }

#startBtn { margin-top:40vh; background:pink; }

#content { animation: fadeIn 2s ease-in-out; }

h1 { font-size:40px; color:#ff4da6; }

@keyframes fadeIn {
  from{opacity:0;}
  to{opacity:1;}
}

/* === IMAGE AREA === */
#slideshow {
  position: relative;
  width: 100%;
  height: 350px;
  margin-top: 40px;
  margin-bottom: 140px; /* 👈 စာမကွယ်အောင် space */
}

.slide {
  width: 180px;
  border-radius: 20px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  opacity: 0;
  z-index: 1;
}

/* === ANIMATION === */
@keyframes splitLeft {
  from { transform: translate(-50%, -50%) scale(0.5); opacity:0; }
  to { transform: translate(-220%, -45%) scale(1) rotate(-10deg); opacity:1; }
}

@keyframes splitCenter {
  from { transform: translate(-50%, -50%) scale(0.5); opacity:0; }
  to { transform: translate(-50%, -50%) scale(1); opacity:1; } /* 👈 အောက်ရွှေ့ */
}

@keyframes splitRight {
  from { transform: translate(-50%, -50%) scale(0.5); opacity:0; }
  to { transform: translate(120%, -50%) scale(1) rotate(10deg); opacity:1; }
}

/* === LETTER === */
#letter {
  margin-top: 60px;
  font-size:20px;
  width:80%;
  margin-left:auto;
  margin-right:auto;
  position: relative;
  z-index: 2; /* 👈 ပုံပေါ်မတက်အောင် */
  text-shadow: 0 0 10px pink;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: pink;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh) scale(1); opacity:1; }
  100% { transform: translateY(-10vh) scale(1.5); opacity:0; }
}
</style>
</head>

<body>

<!-- PASSWORD -->
<div id="passwordBox">
  <h2>Enter Secret Code 💌</h2>
  <p>hint:Our special date (DDMMYYYY)</p>
  <input type="password" id="passwordInput" placeholder="Type here babe...">
  <br><br>
  <button id="unlockBtn" onclick="checkPassword()">Unlock 💖</button>
  <p id="errorMsg"></p>
</div>

<!-- QUIZ -->
<div id="quizBox" class="hidden">
  <h2>Love Quiz 💕</h2>
  <p id="question"></p>
  <input type="text" id="answerInput" placeholder="Your memory...">
  <br><br>
  <button onclick="checkAnswer()">Next ➡️</button>
  <p id="quizError" style="color:red;"></p>
</div>

<button id="startBtn" class="hidden" onclick="startSurprise()">Click here babe 💖</button>

<!-- CONTENT -->
<div id="content" class="hidden">
  <h1>Happy Birthdayyy My Babe 🎉</h1>

  <div id="slideshow">
    <img src="photo2.jpg" class="slide left">
    <img src="photo1.jpg" class="slide center">
    <img src="photo3.jpg" class="slide right">
  </div>

  <p id="letter"></p>
</div>

<audio id="music" src="Perfect.mp3"></audio>

<script>
const correctPassword = "142026";

const quiz = [
  { q: "Where did we first meet?", a: "school" },
  { q: "What is my nickname for you babe?", a: "babe" },
  { q: "A song that reminds us of eachh other", a: "aboutyou" }
];

let current = 0;

function checkPassword() {
  const input = document.getElementById('passwordInput').value;
  if(input === correctPassword) {
    document.getElementById('passwordBox').style.display = 'none';
    document.getElementById('quizBox').classList.remove('hidden');
    loadQuestion();
  } else {
    document.getElementById('errorMsg').innerText = "Nope 😏 think again babe";
  }
}

function loadQuestion() {
  document.getElementById('question').innerText = quiz[current].q;
  document.getElementById('answerInput').value = "";
}

function checkAnswer() {
  const input = document.getElementById('answerInput').value.toLowerCase().trim();
  if(input === quiz[current].a.toLowerCase()) {
    current++;
    if(current < quiz.length) {
      loadQuestion();
    } else {
      document.getElementById('quizBox').style.display = 'none';
      document.getElementById('startBtn').classList.remove('hidden');
    }
  } else {
    document.getElementById('quizError').innerText = "Wrong answer 😝 try again! babe";
  }
}

/* START */
function startSurprise() {
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('content').classList.remove('hidden');
  document.getElementById('music').play();

  showSplitImages();
  typeLetter();
  createHearts();
}

/* SPLIT IMAGE */
function showSplitImages() {
  const left = document.querySelector('.left');
  const center = document.querySelector('.center');
  const right = document.querySelector('.right');

  left.style.animation = "splitLeft 1.5s forwards";
  center.style.animation = "splitCenter 1.5s forwards";
  right.style.animation = "splitRight 1.5s forwards";
}

/* Typing */
const message = "Happy 19th Birthdayyy 💕 You are my everythinggg babe. I am so lucky to have you in my life. I'll always love you forever🫶.";
let i = 0;

function typeLetter() {
  const el = document.getElementById('letter');
  function typing() {
    if(i < message.length) {
      el.innerHTML += message.charAt(i);
      i++;
      setTimeout(typing, 50);
    }
  }
  typing();
}

/* Hearts */
function createHearts() {
  setInterval(() => {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = '💖';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = (Math.random()*20+20) + 'px';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }, 300);
}
</script>

</body>
</html>
